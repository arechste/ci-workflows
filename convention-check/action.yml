name: Convention Check
description: Validate PR title and commit messages follow conventional commit format
inputs:
  check-pr-title:
    description: 'Validate PR title matches conventional commit format'
    required: false
    default: 'true'
  check-commits:
    description: 'Validate commit messages follow conventional format'
    required: false
    default: 'true'
  require-labels:
    description: 'Require at least one type/* label on the PR'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Check PR title format
      if: inputs.check-pr-title == 'true'
      shell: bash
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        pattern='^(feat|fix|refactor|docs|test|chore|ci|perf|style|build|revert|wip)(\([a-zA-Z0-9._-]+\))?!?: .+'

        if [[ "${PR_TITLE}" =~ ${pattern} ]]; then
          echo "PR title follows conventional format: ${PR_TITLE}"
        else
          echo "PR title does not follow conventional commit format."
          echo ""
          echo "Expected: type(scope): description"
          echo "Got:      ${PR_TITLE}"
          echo ""
          echo "Valid types: feat, fix, refactor, docs, test, chore, ci, perf, style, build, revert, wip"
          echo "Examples:"
          echo "  feat(auth): add login endpoint"
          echo "  fix: resolve null pointer in parser"
          echo "  docs(readme): update installation steps"
          exit 1
        fi

    - name: Check commit messages
      if: inputs.check-commits == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        pattern='^(feat|fix|refactor|docs|test|chore|ci|perf|style|build|revert|wip)(\([a-zA-Z0-9._-]+\))?!?: .+'
        merge_pattern='^Merge '

        commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].commit.message' 2>/dev/null || echo "")

        if [[ -z "${commits}" ]]; then
          echo "Could not fetch commits, skipping check"
          exit 0
        fi

        failed=0
        total=0
        while IFS= read -r msg; do
          first_line=$(echo "${msg}" | head -1)
          total=$((total + 1))

          if [[ "${first_line}" =~ ${merge_pattern} ]]; then
            echo "Skipping merge commit: ${first_line}"
            continue
          fi

          if [[ "${first_line}" =~ ${pattern} ]]; then
            echo "OK: ${first_line}"
          else
            echo "BAD: ${first_line}"
            failed=$((failed + 1))
          fi
        done <<< "${commits}"

        if [[ ${failed} -gt 0 ]]; then
          echo ""
          echo "${failed}/${total} commits do not follow conventional format."
          echo "Note: These will be squashed on merge. Ensure the PR title is correct."
        else
          echo ""
          echo "All ${total} commits follow conventional format."
        fi

    - name: Check required labels
      if: inputs.require-labels == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        labels=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" --jq '[.labels[].name] | join(",")')

        has_type=false
        IFS=',' read -ra label_array <<< "${labels}"
        for label in "${label_array[@]}"; do
          if [[ "${label}" == type/* ]]; then
            has_type=true
            echo "Found type label: ${label}"
          fi
        done

        if [[ "${has_type}" != "true" ]]; then
          echo "No type/* label found on this PR."
          echo ""
          echo "Please add one of: type/feature, type/fix, type/refactor, type/docs, type/test, type/ci, type/chore, type/security, type/config"
          exit 1
        fi
