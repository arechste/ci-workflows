name: Convention Check
description: Validate PR title and commit messages follow conventional commit format
inputs:
  check-pr-title:
    description: 'Validate PR title matches conventional commit format'
    required: false
    default: 'true'
  check-commits:
    description: 'Validate commit messages follow conventional format'
    required: false
    default: 'true'
  require-labels:
    description: 'Require at least one type/* label on the PR'
    required: false
    default: 'false'
  check-delegation-fixes:
    description: 'Block Fixes/Closes/Resolves close-keywords that auto-close delegation/* issues'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Check PR title format
      if: inputs.check-pr-title == 'true'
      shell: bash
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        # Conventional commit format: type(scope): description
        # Also accepts: type: description (no scope)
        # Types: feat, fix, refactor, docs, test, chore, ci, perf, style, build, revert, wip
        pattern='^(feat|fix|refactor|docs|test|chore|ci|perf|style|build|revert|wip)(\([a-zA-Z0-9._-]+\))?!?: .+'

        if [[ "${PR_TITLE}" =~ ${pattern} ]]; then
          echo "✅ PR title follows conventional format: ${PR_TITLE}"
        else
          echo "❌ PR title does not follow conventional commit format."
          echo ""
          echo "Expected: type(scope): description"
          echo "Got:      ${PR_TITLE}"
          echo ""
          echo "Valid types: feat, fix, refactor, docs, test, chore, ci, perf, style, build, revert, wip"
          echo "Examples:"
          echo "  feat(auth): add login endpoint"
          echo "  fix: resolve null pointer in parser"
          echo "  docs(readme): update installation steps"
          exit 1
        fi

    - name: Check commit messages
      if: inputs.check-commits == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        pattern='^(feat|fix|refactor|docs|test|chore|ci|perf|style|build|revert|wip)(\([a-zA-Z0-9._-]+\))?!?: .+'
        merge_pattern='^Merge '

        commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].commit.message' 2>/dev/null || echo "")

        if [[ -z "${commits}" ]]; then
          echo "⚠️ Could not fetch commits, skipping check"
          exit 0
        fi

        failed=0
        total=0
        while IFS= read -r msg; do
          # Only check first line of commit message
          first_line=$(echo "${msg}" | head -1)
          total=$((total + 1))

          # Skip merge commits
          if [[ "${first_line}" =~ ${merge_pattern} ]]; then
            echo "⏭️ Skipping merge commit: ${first_line}"
            continue
          fi

          if [[ "${first_line}" =~ ${pattern} ]]; then
            echo "✅ ${first_line}"
          else
            echo "❌ ${first_line}"
            failed=$((failed + 1))
          fi
        done <<< "${commits}"

        if [[ ${failed} -gt 0 ]]; then
          echo ""
          echo "❌ ${failed}/${total} commits do not follow conventional format."
          echo "Note: These will be squashed on merge. Ensure the PR title is correct."
          # Warning only — don't fail the check for commit messages
          # since squash merge uses PR title as the final commit message
        else
          echo ""
          echo "✅ All ${total} commits follow conventional format."
        fi

    - name: Check required labels
      if: inputs.require-labels == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        labels=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" --jq '[.labels[].name] | join(",")')

        has_type=false
        IFS=',' read -ra label_array <<< "${labels}"
        for label in "${label_array[@]}"; do
          if [[ "${label}" == type/* ]]; then
            has_type=true
            echo "✅ Found type label: ${label}"
          fi
        done

        if [[ "${has_type}" != "true" ]]; then
          echo "❌ No type/* label found on this PR."
          echo ""
          echo "Please add one of: type/feature, type/fix, type/refactor, type/docs, type/test, type/ci, type/chore, type/security, type/config"
          exit 1
        fi

    - name: Check delegation auto-close
      if: inputs.check-delegation-fixes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_BODY: ${{ github.event.pull_request.body }}
        REPO: ${{ github.repository }}
      run: |
        # Block GitHub close-keywords (close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved) #N
        # when issue N carries a delegation/* label. Auto-close on merge bypasses the
        # delegator's review → done verification gate.
        # See docs/conventions/delegation-protocol.md and .claude/rules/delegation.md.

        if [[ -z "${PR_BODY}" ]]; then
          echo "⏭️ Empty PR body, skipping delegation check"
          exit 0
        fi

        keyword_re='(close[sd]?|fix(es|ed)?|resolve[sd]?)'
        issue_re="${keyword_re}[[:space:]]+#([0-9]+)"

        # Extract issue numbers referenced by close-keywords (same-repo only).
        # grep -oP would be cleaner but isn't portable; use grep -Eoi + sed.
        matches=$(printf '%s\n' "${PR_BODY}" | grep -Eoi "${issue_re}" || true)

        if [[ -z "${matches}" ]]; then
          echo "✅ No close-keyword references in PR body"
          exit 0
        fi

        issues=$(printf '%s\n' "${matches}" | grep -Eo '[0-9]+' | sort -u)

        violations=0
        for n in ${issues}; do
          labels=$(gh api "repos/${REPO}/issues/${n}" --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "__api_failure__")

          if [[ "${labels}" == "__api_failure__" ]]; then
            echo "⚠️ Could not fetch labels for #${n} — skipping (don't false-block on infra flakes)"
            continue
          fi

          if [[ ",${labels}," == *",delegation/"* ]]; then
            echo "❌ PR body uses a close-keyword for delegation issue #${n} (labels: ${labels})"
            violations=$((violations + 1))
          else
            echo "✅ #${n} is not a delegation issue"
          fi
        done

        if [[ ${violations} -gt 0 ]]; then
          echo ""
          echo "Delegated issues MUST NOT auto-close on merge — the delegator owns the"
          echo "delegation/review → delegation/done transition."
          echo ""
          echo "Fix: replace 'Fixes #N' / 'Closes #N' / 'Resolves #N' with 'Refs #N' in"
          echo "the PR body, transition the label to delegation/review, and post the"
          echo "completion comment per docs/conventions/delegation-protocol.md."
          exit 1
        fi
